<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Circuit Cart — C4 System Context Diagram</title>
  <desc>System context diagram showing Circuit Cart IoT e-commerce platform, its users (Customer, Admin/Vendor), and external systems (Stripe, SendGrid/Twilio, IoT Vendors).</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      svg { font-family: system-ui, -apple-system, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts { font-size: 12px; font-weight: 400; fill: #185FA5; }

      /* Teal — Customer */
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }
      .c-teal .icon-shape { stroke: #0F6E56; }

      /* Purple — Admin */
      .c-purple rect  { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th   { fill: #26215C; }
      .c-purple .ts   { fill: #534AB7; }
      .c-purple .icon-shape { stroke: #534AB7; }

      /* Blue — Core system */
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #042C53; }
      .c-blue .ts   { fill: #185FA5; }

      /* Amber — Stripe */
      .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th   { fill: #412402; }
      .c-amber .ts   { fill: #854F0B; }

      /* Coral — SendGrid */
      .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th   { fill: #4A1B0C; }
      .c-coral .ts   { fill: #993C1D; }

      /* Green — IoT Vendors */
      .c-green rect  { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th   { fill: #173404; }
      .c-green .ts   { fill: #3B6D11; }

      .node { cursor: pointer; }
      .node:hover rect { opacity: 0.85; }

      /* Edge labels */
      .edge-label-bg { fill: #ffffff; }
      .edge-label    { font-size: 11px; font-weight: 400; fill: #5F5E5A; }

      /* Legend */
      .legend-bg     { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; }
      .legend-text   { font-size: 11px; fill: #5F5E5A; }
      .legend-title  { font-size: 11px; font-weight: 500; fill: #444441; }

      /* Boundary */
      .boundary { fill: none; stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 6 4; }
      .boundary-label { font-size: 11px; fill: #888780; }
    </style>
  </defs>

  <!-- ── System boundary ── -->
  <rect class="boundary" x="20" y="20" width="640" height="580" rx="16"/>
  <text class="boundary-label" x="34" y="42">System context — Circuit Cart</text>

  <!-- ══════════════════════════════════════════
       PEOPLE  (top row)
  ══════════════════════════════════════════ -->

  <!-- Customer -->
  <g class="node c-teal">
    <rect x="46" y="68" width="158" height="72" rx="10" stroke-width="0.5"/>
    <circle cx="80" cy="92" r="9" fill="none" stroke-width="1.2" class="icon-shape"/>
    <path d="M62 126 Q62 112 80 112 Q98 112 98 126" fill="none" stroke-width="1.2" stroke-linecap="round" class="icon-shape"/>
    <text class="th" x="145" y="92" text-anchor="middle" dominant-baseline="central">Customer</text>
    <text class="ts" x="145" y="112" text-anchor="middle" dominant-baseline="central">Shops for IoT products</text>
  </g>

  <!-- Admin / Vendor -->
  <g class="node c-purple">
    <rect x="476" y="68" width="168" height="72" rx="10" stroke-width="0.5"/>
    <circle cx="510" cy="92" r="9" fill="none" stroke-width="1.2" class="icon-shape"/>
    <path d="M492 126 Q492 112 510 112 Q528 112 528 126" fill="none" stroke-width="1.2" stroke-linecap="round" class="icon-shape"/>
    <text class="th" x="578" y="92" text-anchor="middle" dominant-baseline="central">Admin / Vendor</text>
    <text class="ts" x="578" y="112" text-anchor="middle" dominant-baseline="central">Manages catalog &amp; orders</text>
  </g>

  <!-- ══════════════════════════════════════════
       CORE SYSTEM  (centre)
  ══════════════════════════════════════════ -->
  <g class="node c-blue">
    <rect x="210" y="220" width="260" height="100" rx="14" stroke-width="1"/>
    <line x1="226" y1="252" x2="254" y2="252" stroke="#185FA5" stroke-width="0.8" opacity="0.4"/>
    <circle cx="258" cy="252" r="2.5" fill="#185FA5" opacity="0.5"/>
    <line x1="426" y1="252" x2="454" y2="252" stroke="#185FA5" stroke-width="0.8" opacity="0.4"/>
    <circle cx="422" cy="252" r="2.5" fill="#185FA5" opacity="0.5"/>
    <text class="th" x="340" y="258" text-anchor="middle" dominant-baseline="central" style="font-size:15px">Circuit Cart</text>
    <text class="ts" x="340" y="278" text-anchor="middle" dominant-baseline="central">IoT e-commerce platform</text>
    <text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">Next.js + Microservices</text>
  </g>

  <!-- ══════════════════════════════════════════
       EXTERNAL SYSTEMS  (bottom row)
  ══════════════════════════════════════════ -->

  <!-- Stripe -->
  <g class="node c-amber">
    <rect x="46" y="440" width="178" height="80" rx="10" stroke-width="0.5"/>
    <text class="th" x="135" y="468" text-anchor="middle" dominant-baseline="central">Stripe</text>
    <text class="ts" x="135" y="487" text-anchor="middle" dominant-baseline="central">Payment processing</text>
    <text class="ts" x="135" y="503" text-anchor="middle" dominant-baseline="central" opacity="0.7">External SaaS</text>
  </g>

  <!-- SendGrid / Twilio -->
  <g class="node c-coral">
    <rect x="251" y="440" width="178" height="80" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="462" text-anchor="middle" dominant-baseline="central">SendGrid / Twilio</text>
    <text class="ts" x="340" y="481" text-anchor="middle" dominant-baseline="central">Email &amp; SMS alerts</text>
    <text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central" opacity="0.7">External SaaS</text>
  </g>

  <!-- IoT Vendors -->
  <g class="node c-green">
    <rect x="456" y="440" width="188" height="80" rx="10" stroke-width="0.5"/>
    <text class="th" x="550" y="462" text-anchor="middle" dominant-baseline="central">IoT Vendors</text>
    <text class="ts" x="550" y="481" text-anchor="middle" dominant-baseline="central">Raspberry Pi, ESP32…</text>
    <text class="ts" x="550" y="498" text-anchor="middle" dominant-baseline="central" opacity="0.7">External API</text>
  </g>

  <!-- ══════════════════════════════════════════
       CONNECTORS
  ══════════════════════════════════════════ -->

  <!-- Customer → Circuit Cart -->
  <path d="M 204 112 L 204 172 L 270 172 L 270 220"
        fill="none" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="144" y="160" width="110" height="20" rx="4" class="edge-label-bg" opacity="0.9"/>
  <text class="edge-label" x="199" y="173" text-anchor="middle">Browse &amp; purchase · HTTPS</text>

  <!-- Admin → Circuit Cart -->
  <path d="M 476 112 L 476 172 L 410 172 L 410 220"
        fill="none" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="416" y="160" width="106" height="20" rx="4" class="edge-label-bg" opacity="0.9"/>
  <text class="edge-label" x="469" y="173" text-anchor="middle">Manage catalog · HTTPS</text>

  <!-- Circuit Cart → Stripe -->
  <path d="M 280 320 L 280 380 L 135 380 L 135 440"
        fill="none" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="148" y="368" width="112" height="20" rx="4" class="edge-label-bg" opacity="0.9"/>
  <text class="edge-label" x="204" y="381" text-anchor="middle">Process payment · HTTPS</text>

  <!-- Circuit Cart → SendGrid -->
  <path d="M 340 320 L 340 440"
        fill="none" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="265" y="368" width="110" height="20" rx="4" class="edge-label-bg" opacity="0.9"/>
  <text class="edge-label" x="320" y="381" text-anchor="middle">Send notifications · HTTPS</text>

  <!-- Circuit Cart → IoT Vendors -->
  <path d="M 400 320 L 400 380 L 550 380 L 550 440"
        fill="none" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="416" y="368" width="118" height="20" rx="4" class="edge-label-bg" opacity="0.9"/>
  <text class="edge-label" x="475" y="381" text-anchor="middle">Sync product data · API</text>

  <!-- ══════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════ -->
  <rect class="legend-bg" x="476" y="546" width="164" height="52" rx="8"/>
  <text class="legend-title" x="558" y="562" text-anchor="middle">Legend</text>
  <circle cx="492" cy="577" r="5" fill="none" stroke="#888780" stroke-width="1.5"/>
  <text class="legend-text" x="502" y="581">Person</text>
  <rect x="528" y="572" width="10" height="10" rx="2" fill="none" stroke="#888780" stroke-width="1.5"/>
  <text class="legend-text" x="542" y="581">System</text>
  <rect x="590" y="572" width="10" height="10" rx="2" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="3 2"/>
  <text class="legend-text" x="604" y="581">External</text>

</svg>
