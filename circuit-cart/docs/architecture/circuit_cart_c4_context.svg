<svg width="900" height="700" viewBox="0 0 900 700" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Circuit Cart — C4 System Context Diagram</title>
  <desc>System context diagram showing Circuit Cart IoT e-commerce platform, its users and external systems.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

      .boundary      { fill: none; stroke: #C8C6BC; stroke-width: 1; stroke-dasharray: 7 4; }
      .boundary-lbl  { font-size: 12px; fill: #999893; }

      .box-customer  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
      .box-admin     { fill: #EEEDFE; stroke: #534AB7; stroke-width: 1; }
      .box-core      { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1.5; }
      .box-stripe    { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; }
      .box-notif     { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; }
      .box-iot       { fill: #EAF3DE; stroke: #3B6D11; stroke-width: 1; }
      .box-legend    { fill: #F7F6F2; stroke: #C8C6BC; stroke-width: 0.8; }

      .lbl-title     { font-size: 15px; font-weight: 600; }
      .lbl-sub       { font-size: 12px; }
      .lbl-tag       { font-size: 11px; opacity: 0.65; }

      .t-customer    { fill: #085041; }
      .t-admin       { fill: #26215C; }
      .t-core        { fill: #042C53; }
      .t-stripe      { fill: #412402; }
      .t-notif       { fill: #4A1B0C; }
      .t-iot         { fill: #173404; }

      .connector     { fill: none; stroke: #AAAAAA; stroke-width: 1; }
      .edge-bg       { fill: #FFFFFF; opacity: 0.92; }
      .edge-lbl      { font-size: 10.5px; fill: #666662; }

      .legend-lbl    { font-size: 11px; fill: #555552; }
      .legend-title  { font-size: 11px; font-weight: 600; fill: #333331; }
    </style>
  </defs>

  <!-- Boundary -->
  <rect x="0" y="0" width="900" height="700" fill="white"/>
  <rect class="boundary" x="24" y="24" width="852" height="652" rx="18"/>
  <text class="boundary-lbl" x="42" y="48">System context — Circuit Cart</text>

  <!-- ROW 1: People -->

  <!-- Customer -->
  <rect class="box-customer" x="80" y="80" width="200" height="86" rx="12"/>
  <circle cx="122" cy="107" r="11" fill="none" stroke="#0F6E56" stroke-width="1.4"/>
  <path d="M101 166 Q101 148 122 148 Q143 148 143 166" fill="none" stroke="#0F6E56" stroke-width="1.4" stroke-linecap="round"/>
  <text class="lbl-title t-customer" x="220" y="108" text-anchor="middle" dominant-baseline="central">Customer</text>
  <text class="lbl-sub  t-customer" x="220" y="130" text-anchor="middle" dominant-baseline="central">Shops for IoT products</text>

  <!-- Admin / Vendor -->
  <rect class="box-admin" x="620" y="80" width="220" height="86" rx="12"/>
  <circle cx="662" cy="107" r="11" fill="none" stroke="#534AB7" stroke-width="1.4"/>
  <path d="M641 166 Q641 148 662 148 Q683 148 683 166" fill="none" stroke="#534AB7" stroke-width="1.4" stroke-linecap="round"/>
  <text class="lbl-title t-admin" x="750" y="108" text-anchor="middle" dominant-baseline="central">Admin / Vendor</text>
  <text class="lbl-sub  t-admin" x="750" y="130" text-anchor="middle" dominant-baseline="central">Manages catalog &amp; orders</text>

  <!-- ROW 2: Core System -->
  <rect class="box-core" x="300" y="272" width="300" height="110" rx="16"/>
  <circle cx="322" cy="308" r="3" fill="#185FA5" opacity="0.35"/>
  <line x1="325" y1="308" x2="348" y2="308" stroke="#185FA5" stroke-width="0.8" opacity="0.3"/>
  <circle cx="578" cy="308" r="3" fill="#185FA5" opacity="0.35"/>
  <line x1="552" y1="308" x2="575" y2="308" stroke="#185FA5" stroke-width="0.8" opacity="0.3"/>
  <text class="lbl-title t-core" x="450" y="310" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700">Circuit Cart</text>
  <text class="lbl-sub  t-core" x="450" y="334" text-anchor="middle" dominant-baseline="central">IoT e-commerce platform</text>
  <text class="lbl-sub  t-core" x="450" y="356" text-anchor="middle" dominant-baseline="central">Next.js + Microservices</text>

  <!-- ROW 3: External Systems -->

  <!-- Stripe -->
  <rect class="box-stripe" x="60" y="510" width="210" height="96" rx="12"/>
  <text class="lbl-title t-stripe" x="165" y="542" text-anchor="middle" dominant-baseline="central">Stripe</text>
  <text class="lbl-sub  t-stripe" x="165" y="564" text-anchor="middle" dominant-baseline="central">Payment processing</text>
  <text class="lbl-tag  t-stripe" x="165" y="584" text-anchor="middle" dominant-baseline="central">External SaaS</text>

  <!-- SendGrid / Twilio -->
  <rect class="box-notif" x="330" y="510" width="240" height="96" rx="12"/>
  <text class="lbl-title t-notif" x="450" y="536" text-anchor="middle" dominant-baseline="central">SendGrid / Twilio</text>
  <text class="lbl-sub  t-notif" x="450" y="558" text-anchor="middle" dominant-baseline="central">Email &amp; SMS notifications</text>
  <text class="lbl-tag  t-notif" x="450" y="578" text-anchor="middle" dominant-baseline="central">External SaaS</text>

  <!-- IoT Vendors -->
  <rect class="box-iot" x="630" y="510" width="220" height="96" rx="12"/>
  <text class="lbl-title t-iot" x="740" y="536" text-anchor="middle" dominant-baseline="central">IoT Vendors</text>
  <text class="lbl-sub  t-iot" x="740" y="558" text-anchor="middle" dominant-baseline="central">Raspberry Pi, ESP32, Arduino</text>
  <text class="lbl-tag  t-iot" x="740" y="578" text-anchor="middle" dominant-baseline="central">External API</text>

  <!-- CONNECTORS -->

  <!-- Customer → Circuit Cart -->
  <path class="connector" d="M 180 166 L 180 226 L 350 226 L 350 272" marker-end="url(#arrow)"/>
  <rect class="edge-bg" x="178" y="214" width="148" height="18" rx="3"/>
  <text class="edge-lbl" x="252" y="227" text-anchor="middle">Browse &amp; purchase · HTTPS</text>

  <!-- Admin → Circuit Cart -->
  <path class="connector" d="M 730 166 L 730 226 L 550 226 L 550 272" marker-end="url(#arrow)"/>
  <rect class="edge-bg" x="574" y="214" width="138" height="18" rx="3"/>
  <text class="edge-lbl" x="643" y="227" text-anchor="middle">Manage catalog · HTTPS</text>

  <!-- Circuit Cart → Stripe -->
  <path class="connector" d="M 360 382 L 360 460 L 165 460 L 165 510" marker-end="url(#arrow)"/>
  <rect class="edge-bg" x="182" y="448" width="148" height="18" rx="3"/>
  <text class="edge-lbl" x="256" y="461" text-anchor="middle">Process payment · HTTPS</text>

  <!-- Circuit Cart → SendGrid -->
  <path class="connector" d="M 450 382 L 450 510" marker-end="url(#arrow)"/>
  <rect class="edge-bg" x="338" y="448" width="148" height="18" rx="3"/>
  <text class="edge-lbl" x="412" y="461" text-anchor="middle">Send notifications · HTTPS</text>

  <!-- Circuit Cart → IoT Vendors -->
  <path class="connector" d="M 540 382 L 540 460 L 740 460 L 740 510" marker-end="url(#arrow)"/>
  <rect class="edge-bg" x="590" y="448" width="138" height="18" rx="3"/>
  <text class="edge-lbl" x="659" y="461" text-anchor="middle">Sync product data · API</text>

  <!-- LEGEND -->
  <rect class="box-legend" x="60" y="632" width="220" height="36" rx="8"/>
  <text class="legend-title" x="80" y="655">Legend</text>
  <circle cx="152" cy="651" r="6" fill="none" stroke="#888780" stroke-width="1.4"/>
  <text class="legend-lbl" x="162" y="655">Person</text>
  <rect x="202" y="645" width="12" height="12" rx="2" fill="none" stroke="#888780" stroke-width="1.4"/>
  <text class="legend-lbl" x="218" y="655">System</text>

</svg>
